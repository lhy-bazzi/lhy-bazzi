version: "3.8"

# Application services — requires the infra stack to be running first:
#   docker compose -f docker/docker-compose.infra.yml up -d
#
# Then start this stack:
#   docker compose -f docker/docker-compose.yml up -d

services:
  # ---- FastAPI AI Service ----
  uni-ai-python:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: uni-ai-python
    ports:
      - "8100:8100"
    env_file:
      - ../.env
    environment:
      - UNI_AI_ENV=prod
    volumes:
      - ../configs:/app/configs:ro
      - ../logs:/app/logs
    networks:
      - uni-ai-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---- Celery Worker (document parsing tasks) ----
  uni-ai-celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: uni-ai-celery
    command: celery -A app.tasks.celery_app worker --pool=prefork --concurrency=2 --loglevel=info
    env_file:
      - ../.env
    environment:
      - UNI_AI_ENV=prod
    volumes:
      - ../configs:/app/configs:ro
      - ../logs:/app/logs
    networks:
      - uni-ai-net
    restart: unless-stopped

  # ---- Nginx Reverse Proxy ----
  uni-ai-nginx:
    image: nginx:1.25-alpine
    container_name: uni-ai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - uni-ai-python
    networks:
      - uni-ai-net
    restart: unless-stopped

networks:
  uni-ai-net:
    external: true
