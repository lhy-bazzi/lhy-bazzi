worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ---- Upstream: Python AI Service ----
    upstream uni_ai_python {
        server uni-ai-python:8100;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Max upload size (for document upload pass-through)
        client_max_body_size 200m;

        # SSE / streaming — disable buffering
        proxy_buffering         off;
        proxy_cache             off;

        # Common proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts (generous for long-running parse / deep QA)
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # ---- API endpoints ----
        location /api/ {
            proxy_pass http://uni_ai_python;
        }

        # ---- SSE chat endpoint (extra-long read timeout) ----
        location /api/v1/chat/completions {
            proxy_pass         http://uni_ai_python;
            proxy_read_timeout 600s;
            # SSE must not be buffered
            proxy_buffering    off;
            proxy_cache        off;
            add_header X-Accel-Buffering no;
        }

        # ---- Swagger / ReDoc (development convenience) ----
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://uni_ai_python;
        }

        # ---- Health check ----
        location /health {
            proxy_pass http://uni_ai_python/api/v1/system/health;
            access_log off;
        }

        # ---- Metrics (restrict to internal; remove in prod or add auth) ----
        location /metrics {
            proxy_pass http://uni_ai_python/metrics;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
    }
}
